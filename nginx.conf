# Docker nginx configuration for Lovecode / SoftChat.
# This file is used when nginx runs inside Docker Compose (see previous versions
# of docker-compose.yaml). For host nginx, use nginx-host.conf instead.

worker_processes auto;

events {
  worker_connections 2048;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  server_tokens off;

  # Preserve original scheme when TLS terminates upstream (e.g. Cloudflare, ALB).
  map $http_x_forwarded_proto $forwarded_proto {
    ""      $scheme;
    default $http_x_forwarded_proto;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
  }

  # Per-IP throttling (tune rates if many users share one NAT).
  limit_req_zone $binary_remote_addr zone=limit_general:10m rate=25r/s;
  limit_req_zone $binary_remote_addr zone=limit_api:10m rate=8r/s;
  limit_req_status 429;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 120;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  # Modern SSL configuration (nginx terminates TLS).
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  server {
    listen 80;
    server_name www.lovecode.com lovecode.com;

    # Allow Let's Encrypt HTTP-01 challenges; redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Health check must stay on HTTP so the container healthcheck passes
    # before real certificates are available and without cert-name mismatch.
    location = /nginx-health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name www.lovecode.com lovecode.com;

    # Update these paths if your certificate directory name differs.
    ssl_certificate     /etc/letsencrypt/live/lovecode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lovecode.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    location = /nginx-health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    client_max_body_size 25m;

    # Next.js / auth can send large Set-Cookie headers; default proxy buffers are too small.
    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 256k;

    limit_req zone=limit_general burst=60 nodelay;

    # Builder AI routes can exceed nginx's default 60s proxy read timeout → 504.
    # SSE streams need buffering disabled so chunks reach the client immediately.
    location /api/ {
      limit_req zone=limit_api burst=30 nodelay;

      proxy_pass         http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $forwarded_proto;
      proxy_set_header   X-Forwarded-Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_buffering    off;
      proxy_cache        off;
      proxy_connect_timeout  75s;
      proxy_send_timeout     900s;
      proxy_read_timeout     900s;

      # Disable gzip for API routes so streaming SSE responses aren't buffered
      gzip off;
    }

    # Proxy all traffic to the Next.js app container
    location / {
      proxy_pass         http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $forwarded_proto;
      proxy_set_header   X-Forwarded-Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Long cache for typical static extensions (no .exe — avoid caching unexpected binaries).
    # Note: any add_header here replaces parent add_header — repeat security headers below.
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
      expires 7d;
      add_header Cache-Control "public, no-transform" always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

      proxy_pass         http://app:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $forwarded_proto;
      proxy_set_header   X-Forwarded-Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
