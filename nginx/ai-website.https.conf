# AI-Website server blocks for the HOST nginx — full HTTPS.
#
# Installed automatically by scripts/deploy.sh as /etc/nginx/sites-available/
# ai-website once certificates exist (sudo bash scripts/deploy.sh),
# replacing the HTTP bootstrap (ai-website.http.conf).
# Certificates live on the host under /etc/letsencrypt (certbot --webroot).
#
# ADDITIVE: this is a self-contained site file. It does not touch any other
# website configured on this nginx.
#
# Renewal: certbot renews into /etc/letsencrypt; the renewal hook installed by
# deploy.sh (/etc/letsencrypt/renewal-hooks/deploy/ai-website-nginx.sh)
# reloads nginx so it picks up new certs.
#
# Note: HSTS below covers ai-web-builder.com incl. subdomains (admin). Remove
# the header if you also serve other subdomains that are not HTTPS-ready.

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www.ai-web-builder.com — HTTP (redirect + ACME)
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name www.ai-web-builder.com ai-web-builder.com;

  # Let's Encrypt HTTP-01 challenges must stay on HTTP (renewals keep working).
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Canonical redirect on HTTP: send both www and bare-domain to the HTTPS
  # non-www host. ACME challenges and the health check above stay on HTTP.
  location / {
    return 301 https://ai-web-builder.com$request_uri;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www.ai-web-builder.com — HTTPS
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name www.ai-web-builder.com ai-web-builder.com;

  ssl_certificate     /etc/letsencrypt/live/ai-web-builder.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ai-web-builder.com/privkey.pem;

  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Canonical redirect: www.ai-web-builder.com → ai-web-builder.com (preserve path and query).
  if ($host = www.ai-web-builder.com) {
    return 301 https://ai-web-builder.com$request_uri;
  }

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

  client_max_body_size 25m;

  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Backend health/readiness endpoints are exposed at the root path.
  location ~ ^/(health|live|ready)$ {
    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    access_log off;
  }

  # Builder AI routes can exceed nginx's default 60s proxy read timeout → 504.
  # SSE streams need buffering disabled so chunks reach the client immediately.
  location /api/ {
    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_connect_timeout  75s;
    proxy_send_timeout     900s;
    proxy_read_timeout     900s;

    gzip off;
  }

  # Proxy all remaining traffic to the Next.js frontend container.
  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# admin.ai-web-builder.com — HTTP (redirect + ACME)
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name admin.ai-web-builder.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# admin.ai-web-builder.com — HTTPS
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name admin.ai-web-builder.com;

  ssl_certificate     /etc/letsencrypt/live/ai-web-builder.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ai-web-builder.com/privkey.pem;

  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

  client_max_body_size 25m;
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    # Host port 3001 maps to the admin container's port 3000.
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}
