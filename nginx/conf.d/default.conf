# Docker nginx reverse proxy — active HTTP config (loaded by nginx:alpine via conf.d).
# Serves the site on port 80 immediately so `docker compose up` works without a host nginx.
# To enable HTTPS, see ssl.conf.template and nginx/README.md.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ""      close;
}

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www — HTTP
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name ai-web-builder.com www.ai-web-builder.com;

  # Let's Encrypt HTTP-01 challenges (webroot).
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  client_max_body_size 25m;

  # Next.js / auth can send large Set-Cookie headers; default proxy buffers are too small.
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  # Backend health/readiness endpoints.
  location ~ ^/(health|live|ready)$ {
    proxy_pass         http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    access_log off;
  }

  # Builder AI routes can exceed nginx's default 60s proxy read timeout -> 504.
  # SSE streams need buffering disabled so chunks reach the client immediately.
  location /api/ {
    proxy_pass         http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_connect_timeout  75s;
    proxy_send_timeout     900s;
    proxy_read_timeout     900s;
    gzip off;
  }

  # Frontend (Next.js).
  location / {
    proxy_pass         http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# admin.ai-web-builder.com — HTTP
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name admin.ai-web-builder.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  client_max_body_size 25m;

  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location / {
    proxy_pass         http://admin:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}
