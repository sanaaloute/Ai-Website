# AI-Website server blocks for the HOST nginx — HTTP-ONLY BOOTSTRAP.
#
# Installed by scripts/deploy.sh as /etc/nginx/sites-available/ai-website
# (+ symlink in sites-enabled). Used only until a Let's Encrypt certificate
# exists; once certs are issued (automatic on sudo bash scripts/deploy.sh)
# the script replaces this with ai-website.https.conf automatically.
#
# ADDITIVE: this is a self-contained site file. It does not touch any other
# website configured on this nginx.
#
# Upstreams are the ai-website Docker containers' loopback bindings
# (127.0.0.1:3000 frontend, :4000 backend, :3001 admin).

server {
  listen 80;
  server_name www.ai-web-builder.com ai-web-builder.com;

  # Let's Encrypt HTTP-01 challenges must stay on HTTP (webroot).
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Health check for nginx itself.
  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  client_max_body_size 25m;

  # Next.js / auth can send large Set-Cookie headers; default proxy buffers are too small.
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  # Backend health/readiness endpoints are exposed at the root path.
  location ~ ^/(health|live|ready)$ {
    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    access_log off;
  }

  # Builder AI routes can exceed nginx's default 60s proxy read timeout → 504.
  # SSE streams need buffering disabled so chunks reach the client immediately.
  location /api/ {
    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_connect_timeout  75s;
    proxy_send_timeout     900s;
    proxy_read_timeout     900s;

    # Disable gzip for API routes so streaming SSE responses aren't buffered.
    gzip off;
  }

  # Proxy all remaining traffic to the Next.js frontend container.
  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}

server {
  listen 80;
  server_name admin.ai-web-builder.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  client_max_body_size 25m;
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location / {
    # Host port 3001 maps to the admin container's port 3000.
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}
