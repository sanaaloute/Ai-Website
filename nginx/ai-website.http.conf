# AI-Website — host nginx site (HTTP bootstrap).
#
# Installed ONCE by scripts/deploy.sh to /etc/nginx/sites-available/ai-website
# (symlinked into sites-enabled) and then left untouched: certbot --nginx edits
# the installed copy in place to add the HTTPS blocks and the HTTP→HTTPS
# redirect — the same "managed by Certbot" flow already used on this host.
#
# Manual equivalent:
#   sudo install -m 0644 nginx/ai-website.http.conf /etc/nginx/sites-available/ai-website
#   sudo ln -sfn /etc/nginx/sites-available/ai-website /etc/nginx/sites-enabled/ai-website
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx --redirect \
#     -d ai-web-builder.com -d www.ai-web-builder.com -d admin.ai-web-builder.com
#
# Requires DNS A/AAAA records for ai-web-builder.com, www.ai-web-builder.com
# and admin.ai-web-builder.com pointing to this host.
#
# Notes for the shared host:
#   - Rate-limit zones are prefixed (aiw_*) so they can't collide with zones
#     from other sites on this nginx instance.
#   - No WebSocket upgrade headers: the app streams via SSE only.
#   - After HTTPS works, enable HSTS in the HTTPS server blocks (search "HSTS").

limit_req_zone $binary_remote_addr zone=aiw_general:10m rate=25r/s;
limit_req_zone $binary_remote_addr zone=aiw_api:10m rate=8r/s;

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www.ai-web-builder.com
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name ai-web-builder.com www.ai-web-builder.com;

  client_max_body_size 25m;

  # Next.js / auth can send large Set-Cookie headers; default proxy buffers are too small.
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  # HSTS: enable only after HTTPS is confirmed working (certbot adds the 443
  # listener to this block; move/add the header there, it is harmless on :80):
  # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  limit_req zone=aiw_general burst=60 nodelay;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Backend health/readiness endpoints are exposed at the root path.
  location ~ ^/(health|live|ready)$ {
    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    access_log off;
  }

  # Builder AI routes can exceed nginx's default 60s proxy read timeout → 504.
  # SSE streams need buffering disabled so chunks reach the client immediately.
  location /api/ {
    limit_req zone=aiw_api burst=30 nodelay;

    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_connect_timeout  75s;
    proxy_send_timeout     900s;
    proxy_read_timeout     900s;

    # Disable gzip for API routes so streaming SSE responses aren't buffered.
    gzip off;
  }

  # Proxy all remaining traffic to the Next.js frontend container.
  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# admin.ai-web-builder.com
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name admin.ai-web-builder.com;

  client_max_body_size 25m;

  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  # HSTS: enable only after HTTPS is confirmed working.
  # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}
