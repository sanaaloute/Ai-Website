# AI-Website server blocks for the SHARED nginx gateway container — full HTTPS.
#
# Installed automatically by scripts/deploy.sh once certificates exist
# (sudo bash scripts/deploy.sh --request-cert). Replaces the HTTP bootstrap
# (ai-website.http.conf) at the same path: <gateway conf.d>/ai-website.conf.
#
# Requires in the gateway container:
#   - /etc/letsencrypt mounted read-only at the same path (certificates)
#   - /var/www/certbot mounted at the same path (ACME webroot, for renewals)
# The deploy script checks both and prints exact setup instructions if missing.
#
# Renewal: host certbot renews into /etc/letsencrypt; reload the gateway so it
# picks up new certs — deploy hook at
#   /etc/letsencrypt/renewal-hooks/deploy/reload-gateway.sh:
#     #!/bin/sh
#     docker exec neoshop-api-gateway nginx -s reload
#
# Notes:
#   - resolver 127.0.0.11 + variable proxy_pass: the gateway reloads fine even
#     when the ai-website stack is down, and survives container IP changes.
#   - No Upgrade/Connection headers: the app streams via SSE, not WebSockets.
#   - Rate limiting intentionally omitted (zones belong to the gateway's http
#     context); add limit_req rules if the gateway already defines zones.
#   - HSTS below covers ai-web-builder.com incl. subdomains (admin). Remove the
#     header if you also serve other subdomains that are not HTTPS-ready.

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www.ai-web-builder.com — HTTP (redirect + ACME)
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name www.ai-web-builder.com ai-web-builder.com;

  # Let's Encrypt HTTP-01 challenges must stay on HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www.ai-web-builder.com — HTTPS
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name www.ai-web-builder.com ai-web-builder.com;

  ssl_certificate     /etc/letsencrypt/live/ai-web-builder.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ai-web-builder.com/privkey.pem;

  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

  resolver 127.0.0.11 valid=30s ipv6=off;

  client_max_body_size 25m;

  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Backend health/readiness endpoints are exposed at the root path.
  location ~ ^/(health|live|ready)$ {
    set $aiw_backend http://ai-website-backend:4000;
    proxy_pass         $aiw_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    access_log off;
  }

  # Builder AI routes can exceed nginx's default 60s proxy read timeout → 504.
  # SSE streams need buffering disabled so chunks reach the client immediately.
  location /api/ {
    set $aiw_backend http://ai-website-backend:4000;
    proxy_pass         $aiw_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_connect_timeout  75s;
    proxy_send_timeout     900s;
    proxy_read_timeout     900s;

    gzip off;
  }

  # Proxy all remaining traffic to the Next.js frontend container.
  location / {
    set $aiw_frontend http://ai-website-frontend:3000;
    proxy_pass         $aiw_frontend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# admin.ai-web-builder.com — HTTP (redirect + ACME)
# ─────────────────────────────────────────────────────────────────────────────
