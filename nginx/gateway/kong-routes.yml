# Declarative Kong configuration for AI-Website — FALLBACK ONLY.
#
# The deploy scripts normally configure Kong through its Admin API (which
# persists to Kong's database). Use this file ONLY if your Kong runs DB-less
# (KONG_DATABASE=off / KONG_DECLARATIVE_CONFIG): merge these services/routes
# into the gateway's declarative config file and reload Kong.
#
# Certificates (DB-less): add a `certificates:` entry with the PEM contents
# after issuance, e.g.:
#   certificates:
#     - cert: |
#         -----BEGIN CERTIFICATE-----
#         ...
#       key: |
#         -----BEGIN PRIVATE KEY-----
#         ...
#       snis:
#         - ai-web-builder.com
#         - www.ai-web-builder.com
#         - admin.ai-web-builder.com
#
# Notes:
#   - strip_path: false + preserve_host: true pass path and Host through
#     unchanged, like a plain nginx proxy_pass.
#   - The backend service has 15-minute read/write timeouts for the AI
#     builder's SSE streams.
#   - The acme service points at the HOST's bridge IP on the shared network
#     (certbot --standalone during issuance/renewal). Adjust the IP to your
#     host's bridge gateway (docker network inspect <net> --format
#     '{{(index .IPAM.Config 0).Gateway}}').

_format_version: "3.0"

services:
  - name: ai-website-frontend
    url: http://ai-website-frontend:3000
    routes:
      - name: ai-website-web
        hosts:
          - ai-web-builder.com
          - www.ai-web-builder.com
        paths:
          - /
        strip_path: false
        preserve_host: true

  - name: ai-website-backend
    url: http://ai-website-backend:4000
    connect_timeout: 75000
    read_timeout: 900000
    write_timeout: 900000
    routes:
      - name: ai-website-api
        hosts:
          - ai-web-builder.com
          - www.ai-web-builder.com
        paths:
          - /api
          - /health
          - /live
          - /ready
        strip_path: false
        preserve_host: true

  - name: ai-website-admin
    url: http://ai-website-admin:3000
    routes:
      - name: ai-website-admin
        hosts:
          - admin.ai-web-builder.com
        paths:
          - /
        strip_path: false
        preserve_host: true

  # ACME HTTP-01 (certificate issuance/renewal via certbot --standalone on the
  # host). Replace 172.18.0.1 with the host's bridge IP on the shared network.
  - name: ai-website-acme
    url: http://172.18.0.1:8888
    routes:
      - name: ai-website-acme
        hosts:
          - ai-web-builder.com
          - www.ai-web-builder.com
          - admin.ai-web-builder.com
        paths:
          - /.well-known/acme-challenge
        strip_path: false
        preserve_host: true
        protocols:
          - http
