# AI-Website server blocks for the SHARED nginx gateway container — HTTP-ONLY BOOTSTRAP.
#
# Use this ONLY before a Let's Encrypt certificate exists. Once certs are
# issued (sudo bash scripts/deploy.sh --request-cert), scripts replace this
# file with ai-website.https.conf automatically.
#
# Install: scripts/deploy.sh auto-detects the gateway's mounted config dir and
# copies this file there as ai-website.conf. Manual equivalent:
#   cp ai-website.http.conf <gateway conf.d dir>/ai-website.conf
#   docker exec neoshop-api-gateway nginx -t \
#     && docker exec neoshop-api-gateway nginx -s reload
#
# Requires:
#   - DNS A/AAAA records for ai-web-builder.com, www.ai-web-builder.com and
#     admin.ai-web-builder.com pointing to this host.
#   - /var/www/certbot mounted into the gateway container at the same path
#     (ACME HTTP-01 webroot) — needed only for certificate issuance/renewal.
#
# Notes:
#   - resolver 127.0.0.11 is Docker's embedded DNS. Combined with variable-based
#     proxy_pass, nginx re-resolves the app containers at request time, so the
#     gateway starts/reloads fine even when the ai-website stack is down, and
#     survives container IP changes.
#   - No Upgrade/Connection headers: the app streams via SSE, not WebSockets.
#   - Rate limiting is intentionally omitted here (zones live in the gateway's
#     http context); add limit_req rules if the gateway already defines zones.

server {
  listen 80;
  server_name www.ai-web-builder.com ai-web-builder.com;

  # Let's Encrypt HTTP-01 challenges must stay on HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Health check for the gateway itself.
  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  resolver 127.0.0.11 valid=30s ipv6=off;

  client_max_body_size 25m;

  # Next.js / auth can send large Set-Cookie headers; default proxy buffers are too small.
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  # Backend health/readiness endpoints are exposed at the root path.
  location ~ ^/(health|live|ready)$ {
    set $aiw_backend http://ai-website-backend:4000;
    proxy_pass         $aiw_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    access_log off;
  }

  # Builder AI routes can exceed nginx's default 60s proxy read timeout → 504.
  # SSE streams need buffering disabled so chunks reach the client immediately.
  location /api/ {
    set $aiw_backend http://ai-website-backend:4000;
    proxy_pass         $aiw_backend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_connect_timeout  75s;
    proxy_send_timeout     900s;
    proxy_read_timeout     900s;

    # Disable gzip for API routes so streaming SSE responses aren't buffered.
    gzip off;
  }

  # Proxy all remaining traffic to the Next.js frontend container.
  location / {
    set $aiw_frontend http://ai-website-frontend:3000;
    proxy_pass         $aiw_frontend;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}

server {
  listen 80;
  server_name admin.ai-web-builder.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  resolver 127.0.0.11 valid=30s ipv6=off;

  client_max_body_size 25m;
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location / {
    # The admin container listens on 3000 inside Docker.
    set $aiw_admin http://ai-website-admin:3000;
    proxy_pass         $aiw_admin;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host $host;
  }
}
