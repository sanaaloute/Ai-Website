# AI-Website app stack — shared host edition.
#
# The host runs other services too, and the neoshop-api-gateway CONTAINER owns
# 0.0.0.0:80/443 (host nginx cannot bind them). This stack therefore:
#   - never publishes public ports (127.0.0.1 bindings are debug-only),
#   - joins the gateway's Docker network so the gateway can reverse-proxy our
#     domains to the containers by DNS alias:
#       ai-web-builder.com / www  -> http://ai-website-frontend:3000
#       /api/, /health, /live, /ready -> http://ai-website-backend:4000
#       admin.ai-web-builder.com  -> http://ai-website-admin:3000
#
# The gateway server blocks live in nginx/gateway/*.conf; scripts/deploy.sh
# auto-detects the gateway's mounted config dir and installs them (see
# nginx/README.md).
name: ai-website

services:
  redis:
    image: redis:7-alpine
    container_name: ai-website-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      # Internal only — never exposed to the shared gateway network.
      - internal

  backend:
    image: ai-web-builder-backend
    container_name: ai-website-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Debug access from the host only. Public traffic arrives via the
      # shared gateway network (alias: ai-website-backend).
      - "127.0.0.1:4000:4000"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - APP_HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379/0
      - AGENT_STORE_DIR=/app/.agent_store
    volumes:
      - agent_store_data:/app/.agent_store
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      internal:
      gateway:
        aliases:
          - ai-website-backend

  frontend:
    image: ai-web-builder-frontend
    container_name: ai-website-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Public build-time variables are baked into the Next.js bundle.
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
        NEXT_PUBLIC_AI_WEBSITE_API_KEY_SITE_URL: ${NEXT_PUBLIC_AI_WEBSITE_API_KEY_SITE_URL:-}
    ports:
      # Debug access from the host only (alias for the gateway: ai-website-frontend).
      - "127.0.0.1:3000:3000"
    environment:
      # Runtime-only variables (server components)
      AI_WEBSITE_API_KEY_SITE_URL: ${AI_WEBSITE_API_KEY_SITE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      internal:
      gateway:
        aliases:
          - ai-website-frontend

  admin:
    image: ai-web-builder-admin
    container_name: ai-website-admin
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        # Internal Docker routing keeps admin→backend traffic inside the network
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:4000}
    ports:
      # Debug access from the host only (alias for the gateway: ai-website-admin).
      # Note: container listens on 3000; 3001 is only the host-side debug port.
      - "127.0.0.1:3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      internal:
      gateway:
        aliases:
          - ai-website-admin

networks:
  # Private stack network (backend <-> redis, admin <-> backend, ...).
  internal:
    driver: bridge
  # Shared network owned by the nginx gateway container (neoshop-api-gateway).
  # Created/managed outside this compose project. scripts/deploy.sh auto-detects
  # the gateway's network and exports GATEWAY_NETWORK; you can also pin it in .env.
  gateway:
    external: true
    name: ${GATEWAY_NETWORK:-neoshop_default}

volumes:
  redis_data:
  agent_store_data:
