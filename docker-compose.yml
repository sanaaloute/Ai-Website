# AI-Website app stack — host-nginx tenant edition.
#
# This EC2 also runs OTHER websites behind the host's nginx, which owns
# 0.0.0.0:80/443. This stack therefore never publishes public ports; host
# nginx reverse-proxies our domains to the loopback bindings below:
#   ai-web-builder.com / www  -> 127.0.0.1:3000 (frontend)
#   /api/*, /health, /live, /ready -> 127.0.0.1:4000 (backend)
#   admin.ai-web-builder.com  -> 127.0.0.1:3001 (admin)
# The nginx site config lives in nginx/ai-website.{http,https}.conf and is
# installed into /etc/nginx/sites-available by scripts/deploy.sh (additive —
# other sites on this nginx are never touched).
name: ai-website

services:
  redis:
    image: redis:7-alpine
    container_name: ai-website-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - internal

  backend:
    image: ai-web-builder-backend
    container_name: ai-website-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Debug access from the host only; public traffic arrives via host nginx.
      - "127.0.0.1:4000:4000"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - APP_HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379/0
      - AGENT_STORE_DIR=/app/.agent_store
    volumes:
      - agent_store_data:/app/.agent_store
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - internal

  frontend:
    image: ai-web-builder-frontend
    container_name: ai-website-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Public build-time variables are baked into the Next.js bundle.
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
        NEXT_PUBLIC_AI_WEBSITE_API_KEY_SITE_URL: ${NEXT_PUBLIC_AI_WEBSITE_API_KEY_SITE_URL:-}
    ports:
      # Debug access from the host only; public traffic arrives via host nginx.
      - "127.0.0.1:3000:3000"
    environment:
      # Runtime-only variables (server components)
      AI_WEBSITE_API_KEY_SITE_URL: ${AI_WEBSITE_API_KEY_SITE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  admin:
    image: ai-web-builder-admin
    container_name: ai-website-admin
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        # Internal Docker routing keeps admin→backend traffic inside the network
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:4000}
    ports:
      # Public traffic arrives via host nginx (127.0.0.1:3001 upstream).
      # Note: container listens on 3000; 3001 is only the host-side debug port.
      - "127.0.0.1:3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

networks:
  # Private stack network (backend <-> redis, admin <-> backend, ...).
  internal:
    driver: bridge

volumes:
  redis_data:
  agent_store_data:
