# AI-Website app stack — shared host edition.
#
# The host runs other services too. Host nginx (Debian sites-available layout,
# certbot-managed) is the single public entry point on 80/443; this stack never
# binds public ports. Containers bind 127.0.0.1 only, and the host nginx site
# (nginx/ai-website.http.conf, installed by scripts/deploy.sh) proxies to them:
#
#   ai-web-builder.com / www  -> 127.0.0.1:3000 (frontend)
#   /api/, /health, /live, /ready -> 127.0.0.1:4000 (backend)
#   admin.ai-web-builder.com  -> 127.0.0.1:3001 (admin)
#
# These loopback ports don't conflict with the other services on the host
# (e.g. neoshop containers publish nothing on 3000/3001/4000). Container names
# are prefixed (ai-website-*) to stay collision-free on the shared host.
name: ai-website

services:
  redis:
    image: redis:7-alpine
    container_name: ai-website-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # No ports: reachable only inside the compose network.

  backend:
    image: ai-web-builder-backend
    container_name: ai-website-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Bind to loopback only — host nginx is the single entry point.
      - "127.0.0.1:4000:4000"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - APP_HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379/0
      - AGENT_STORE_DIR=/app/.agent_store
    volumes:
      - agent_store_data:/app/.agent_store
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  frontend:
    image: ai-web-builder-frontend
    container_name: ai-website-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Public build-time variables are baked into the Next.js bundle.
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-}
        NEXT_PUBLIC_AI_WEBSITE_API_KEY_SITE_URL: ${NEXT_PUBLIC_AI_WEBSITE_API_KEY_SITE_URL:-}
    ports:
      # Bind to loopback only — host nginx proxies public traffic here.
      - "127.0.0.1:3000:3000"
    environment:
      # Runtime-only variables (server components)
      AI_WEBSITE_API_KEY_SITE_URL: ${AI_WEBSITE_API_KEY_SITE_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  admin:
    image: ai-web-builder-admin
    container_name: ai-website-admin
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        # Internal Docker routing keeps admin→backend traffic inside the network
        BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:4000}
    ports:
      # Bind to loopback only — host nginx serves admin on its own subdomain.
      - "127.0.0.1:3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  agent_store_data:
