# Host nginx configuration for AI-Website.
# Place this file at /etc/nginx/sites-available/ai-website and symlink it to
# /etc/nginx/sites-enabled/ai-website, then run:
#   sudo certbot --nginx -d ai-web-builder.com -d www.ai-web-builder.com -d admin.ai-web-builder.com
# Certbot will verify / refresh the certificate paths below.
# Requires DNS A/AAAA records for ai-web-builder.com, www.ai-web-builder.com, and admin.ai-web-builder.com.

# Preserve original scheme when TLS terminates upstream (e.g. Cloudflare, ALB).
map $http_x_forwarded_proto $forwarded_proto {
  ""      $scheme;
  default $http_x_forwarded_proto;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ""      close;
}

# Per-IP throttling (tune rates if many users share one NAT).
limit_req_zone $binary_remote_addr zone=limit_general:10m rate=25r/s;
limit_req_zone $binary_remote_addr zone=limit_api:10m rate=8r/s;
limit_req_status 429;

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www.ai-web-builder.com — HTTP
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name www.ai-web-builder.com ai-web-builder.com;

  # Let’s Encrypt HTTP-01 challenges must stay on HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Health check must stay on HTTP so the container healthcheck passes
  # before real certificates are available and without cert-name mismatch.
  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Redirect everything else to HTTPS.
  location / {
    return 301 https://$host$request_uri;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www.ai-web-builder.com — HTTPS
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name www.ai-web-builder.com ai-web-builder.com;

  # Update these paths if your certificate directory name differs.
  ssl_certificate     /etc/letsencrypt/live/ai-web-builder.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ai-web-builder.com/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  # HSTS — only enable once HTTPS is confirmed working. includeSubDomains also
  # covers admin.ai-web-builder.com because it is served from the same nginx instance.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

  client_max_body_size 25m;

  # Next.js / auth can send large Set-Cookie headers; default proxy buffers are too small.
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  limit_req zone=limit_general burst=60 nodelay;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Backend health/readiness endpoints are exposed at the root path.
  location ~ ^/(health|live|ready)$ {
    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    access_log off;
  }

  # Builder AI routes can exceed nginx's default 60s proxy read timeout → 504.
  # SSE streams need buffering disabled so chunks reach the client immediately.
  location /api/ {
    limit_req zone=limit_api burst=30 nodelay;

    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_connect_timeout  75s;
    proxy_send_timeout     900s;
    proxy_read_timeout     900s;

    # Disable gzip for API routes so streaming SSE responses aren't buffered.
    gzip off;
  }

  # Proxy all traffic to the Next.js frontend container on localhost.
  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
  }

  # Long cache for typical static extensions (no .exe — avoid caching unexpected binaries).
  # Note: any add_header here replaces parent add_header — repeat security headers below.
  location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, no-transform" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# admin.ai-web-builder.com — HTTP
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name admin.ai-web-builder.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# admin.ai-web-builder.com — HTTPS
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name admin.ai-web-builder.com;

  ssl_certificate     /etc/letsencrypt/live/ai-web-builder.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/ai-web-builder.com/privkey.pem;
  include             /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

  client_max_body_size 25m;

  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location / {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}
