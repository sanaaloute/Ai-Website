# Host nginx configuration for AI-Website — HTTP-ONLY BOOTSTRAP.
#
# Use this ONLY on first boot, before a Let's Encrypt certificate exists, so
# nginx can start (no ssl_certificate file yet) and answer the ACME HTTP-01
# challenge while still serving the app over plain HTTP.
#
# Install (handled automatically by scripts/deploy.sh on first boot):
#   sudo install -m 0644 nginx-host.http.conf /etc/nginx/sites-available/ai-website
#   sudo ln -sfn /etc/nginx/sites-available/ai-website /etc/nginx/sites-enabled/ai-website
#   sudo nginx -t && sudo systemctl reload nginx
#
# Once a certificate exists, replace this with the full HTTPS config:
#   sudo install -m 0644 nginx-host.conf /etc/nginx/sites-available/ai-website
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires DNS A records for ai-web-builder.com, www.ai-web-builder.com, admin.ai-web-builder.com.

# Preserve original scheme when TLS terminates upstream (e.g. Cloudflare, ALB).
map $http_x_forwarded_proto $forwarded_proto {
  ""      $scheme;
  default $http_x_forwarded_proto;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  ""      close;
}

# Per-IP throttling (tune rates if many users share one NAT).
limit_req_zone $binary_remote_addr zone=limit_general:10m rate=25r/s;
limit_req_zone $binary_remote_addr zone=limit_api:10m rate=8r/s;
limit_req_status 429;

# ─────────────────────────────────────────────────────────────────────────────
# ai-web-builder.com / www.ai-web-builder.com — HTTP (bootstrap)
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name www.ai-web-builder.com ai-web-builder.com;

  # Let's Encrypt HTTP-01 challenges must stay on HTTP.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Health check (used to verify nginx is up before a certificate exists).
  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  client_max_body_size 25m;

  # Next.js / auth can send large Set-Cookie headers; default proxy buffers are too small.
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  limit_req zone=limit_general burst=60 nodelay;

  # Backend health/readiness endpoints.
  location ~ ^/(health|live|ready)$ {
    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    access_log off;
  }

  # Builder AI routes can exceed nginx's default 60s proxy read timeout -> 504.
  # SSE streams need buffering disabled so chunks reach the client immediately.
  location /api/ {
    limit_req zone=limit_api burst=30 nodelay;

    proxy_pass         http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering    off;
    proxy_cache        off;
    proxy_connect_timeout  75s;
    proxy_send_timeout     900s;
    proxy_read_timeout     900s;

    gzip off;
  }

  # Proxy all traffic to the Next.js frontend container on localhost.
  location / {
    proxy_pass         http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}

# ─────────────────────────────────────────────────────────────────────────────
# admin.ai-web-builder.com — HTTP (bootstrap)
# ─────────────────────────────────────────────────────────────────────────────
server {
  listen 80;
  server_name admin.ai-web-builder.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  client_max_body_size 25m;
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location / {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection $connection_upgrade;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $forwarded_proto;
    proxy_set_header   X-Forwarded-Host $host;
    proxy_cache_bypass $http_upgrade;
  }
}
