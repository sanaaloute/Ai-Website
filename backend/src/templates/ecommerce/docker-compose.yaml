services:
  pocketbase:
    build: ./pocketbase
    container_name: "{{PROJECT_NAME}}-pocketbase"
    volumes:
      - pb_data:/pb/pb_data
    expose:
      - "8090"
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: .
    container_name: "{{PROJECT_NAME}}-frontend"
    expose:
      - "3000"
    environment:
      - VITE_POCKETBASE_URL=/
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: "{{PROJECT_NAME}}-nginx"
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - pocketbase
    restart: unless-stopped

volumes:
  pb_data:
