# docker-compose.selfhost.yml
#
# Single-server, self-hosted deployment of the whole platform:
#   traefik (edge + TLS) → frontend / backend / admin  (the platform)
#   postgres / redis                                   (platform state)
#   [optional] coolify                                 (deployment engine, profile-gated)
#
# User sites are deployed by the backend as sibling containers on the `web`
# network (DEPLOY_PROVIDER=docker) or via Coolify (DEPLOY_PROVIDER=coolify).
#
# Usage:
#   cp .env.selfhost.example .env
#   docker compose -f docker-compose.selfhost.yml --env-file .env up -d
#   # with Coolify:
#   docker compose -f docker-compose.selfhost.yml --env-file .env --profile coolify up -d
#
# TLS (Let's Encrypt) needs a public domain whose DNS points at this host.
# For localhost, see SELFHOST.md (use the `web` entrypoint without ACME).

x-backend-labels: &backend-labels
  traefik.enable: "true"
  traefik.http.routers.api.rule: "Host(`api.${DEPLOY_BASE_DOMAIN:-localhost}`)"
  traefik.http.routers.api.entrypoints: "websecure"
  traefik.http.routers.api.tls.certresolver: "le"
  traefik.http.services.api.loadbalancer.server.port: "4000"

services:
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=lovecode_web
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lovecode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lovecode}
      POSTGRES_DB: ${POSTGRES_DB:-lovecode}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lovecode}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - platform

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: lovecode-backend
    container_name: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-lovecode}:${POSTGRES_PASSWORD:-lovecode}@postgres:5432/${POSTGRES_DB:-lovecode}?schema=public
      REDIS_URL: redis://redis:6379/0
      AGENT_STORE_DIR: /app/.agent_store
      # Self-hosted deploy target
      DEPLOY_PROVIDER: ${DEPLOY_PROVIDER:-docker}
      DEPLOY_BASE_DOMAIN: ${DEPLOY_BASE_DOMAIN:-localhost}
      DEPLOY_WORKSPACE_DIR: /var/lib/lovecode/sites
      SITE_NETWORK: lovecode_web
    volumes:
      - agent_store_data:/app/.agent_store
      # Docker-out-of-Docker: the backend builds/runs user-site containers.
      - /var/run/docker.sock:/var/run/docker.sock
      # Build workspace MUST be a host path mounted at the SAME absolute path so
      # the host docker daemon can `docker build <path>`.
      - ${DEPLOY_WORKSPACE_DIR:-/var/lib/lovecode/sites}:/var/lib/lovecode/sites
    labels: *backend-labels
    networks:
      - platform
      - web
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: https://api.${DEPLOY_BASE_DOMAIN:-localhost}
    image: lovecode-frontend
    container_name: frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.web.rule: "Host(`${DEPLOY_BASE_DOMAIN:-localhost}`)"
      traefik.http.routers.web.entrypoints: "websecure"
      traefik.http.routers.web.tls.certresolver: "le"
      traefik.http.services.web.loadbalancer.server.port: "3000"
    networks:
      - web

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        BACKEND_API_URL: http://backend:4000
    image: lovecode-admin
    container_name: admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.admin.rule: "Host(`admin.${DEPLOY_BASE_DOMAIN:-localhost}`)"
      traefik.http.routers.admin.entrypoints: "websecure"
      traefik.http.routers.admin.tls.certresolver: "le"
      traefik.http.services.admin.loadbalancer.server.port: "3000"
    networks:
      - web

  # Optional deployment engine for multi-container (Vite + PocketBase) sites and
  # a managed PaaS UI. Start with: --profile coolify. Then set COOLIFY_URL to
  # http://coolify:8000 and COOLIFY_TOKEN in .env and implement CoolifyDeployRunner.
  coolify:
    image: ghcr.io/coollabsio/coolify:latest
    container_name: coolify
    restart: unless-stopped
    profiles: ["coolify"]
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - coolify_data:/data
    networks:
      - web
      - platform

volumes:
  pgdata:
  redis_data:
  letsencrypt:
  agent_store_data:
  coolify_data:

networks:
  web:
    name: lovecode_web
  platform:
    name: lovecode_platform
